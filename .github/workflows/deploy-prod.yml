name: Promote staging to prod

on:
  workflow_dispatch:
    inputs:
      requested_via:
        description: How the production promotion was requested
        required: false
        default: manual
      requested_by:
        description: User or actor that requested production promotion
        required: false
        default: unknown
      source_run_id:
        description: Source staging workflow run ID
        required: false
        default: ""
      source_sha:
        description: Source staging commit SHA to promote
        required: false
        default: ""
      source_tag:
        description: Source staging deployment tag
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  promote-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Promote staging to prod
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
          REQUESTED_VIA: ${{ github.event.inputs.requested_via }}
          REQUESTED_BY: ${{ github.event.inputs.requested_by }}
          SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id }}
          SOURCE_SHA: ${{ github.event.inputs.source_sha }}
          SOURCE_TAG: ${{ github.event.inputs.source_tag }}
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "bash -s -- '$PROJECT_PATH' '$SOURCE_SHA' '$SOURCE_RUN_ID' '$SOURCE_TAG' '$REQUESTED_BY' '$REQUESTED_VIA'" <<'REMOTE_SCRIPT'
            set -euo pipefail
            PROJECT_PATH="$1"
            SOURCE_SHA_VALUE="${2:-}"
            SOURCE_RUN_ID_VALUE="${3:-}"
            SOURCE_TAG_VALUE="${4:-}"
            REQUESTED_BY_VALUE="${5:-unknown}"
            REQUESTED_VIA_VALUE="${6:-manual}"

            echo "[PROD] Promotion requested via: $REQUESTED_VIA_VALUE"
            echo "[PROD] Promotion requested by: $REQUESTED_BY_VALUE"
            if [ -n "$SOURCE_RUN_ID_VALUE" ]; then
              echo "[PROD] Source staging run: $SOURCE_RUN_ID_VALUE"
            fi
            if [ -n "$SOURCE_TAG_VALUE" ]; then
              echo "[PROD] Source staging tag: $SOURCE_TAG_VALUE"
            fi

            echo '[PROD] Preparing log dir and fixing permissions for container user (UID 1002)...'
            if mkdir -p /srv/zana-logs-prod 2>/dev/null; then
              :
            elif sudo -n mkdir -p /srv/zana-logs-prod 2>/dev/null; then
              :
            else
              echo '[PROD] ERROR: Could not create /srv/zana-logs-prod (need permissions or passwordless sudo)'
              exit 1
            fi

            for dir in /srv/zana-users /srv/zana-logs-prod; do
              if chown -R 1002:1002 "$dir" 2>/dev/null || chmod -R 777 "$dir" 2>/dev/null; then
                echo "[PROD] Permissions fixed for $dir without sudo"
              elif sudo -n chown -R 1002:1002 "$dir" 2>/dev/null || sudo -n chmod -R 777 "$dir" 2>/dev/null; then
                echo "[PROD] Permissions fixed for $dir with sudo"
              else
                echo "[PROD] WARNING: Could not fix permissions for $dir"
              fi
            done

            echo '[PROD] Changing to project directory...'
            cd "$PROJECT_PATH"

            echo '[PROD] Checking if staging image exists...'
            if ! docker images | grep -q 'zana-ai-bot.*staging'; then
              echo '[PROD] ERROR: Staging image not found. Please deploy to staging first.'
              exit 1
            fi

            if [ -n "$SOURCE_SHA_VALUE" ]; then
              echo "[PROD] Verifying staging image SHA matches requested source: $SOURCE_SHA_VALUE"
              STAGING_IMAGE_SHA="$(docker run --rm --entrypoint cat zana-ai-bot:staging /app/VERSION 2>/dev/null || true)"
              if [ -z "$STAGING_IMAGE_SHA" ]; then
                echo '[PROD] ERROR: Could not read /app/VERSION from staging image.'
                exit 1
              fi
              if [ "$STAGING_IMAGE_SHA" != "$SOURCE_SHA_VALUE" ] \
                && [ "${STAGING_IMAGE_SHA#"$SOURCE_SHA_VALUE"}" = "$STAGING_IMAGE_SHA" ] \
                && [ "${SOURCE_SHA_VALUE#"$STAGING_IMAGE_SHA"}" = "$SOURCE_SHA_VALUE" ]; then
                echo "[PROD] ERROR: Staging image SHA mismatch. image=$STAGING_IMAGE_SHA requested=$SOURCE_SHA_VALUE"
                exit 1
              fi
              echo "[PROD] OK: staging image SHA verified: $STAGING_IMAGE_SHA"
            else
              echo '[PROD] No source_sha input provided; promoting current zana-ai-bot:staging image.'
            fi

            echo '[PROD] Tagging zana-ai-bot:staging as zana-ai-bot:prod...'
            docker tag zana-ai-bot:staging zana-ai-bot:prod

            echo '[PROD] Cleaning stale compose containers that may block recreate...'
            docker ps -aq --filter label=com.docker.compose.service=zana-prod | xargs -r docker rm -f || true
            docker ps -aq --filter label=com.docker.compose.service=zana-webapp | xargs -r docker rm -f || true

            echo '[PROD] Restarting production container...'
            docker compose up -d zana-prod

            echo '[PROD] Building and restarting webapp (includes frontend build in Dockerfile.webapp)...'
            docker compose build --progress=plain zana-webapp
            docker compose up -d --force-recreate zana-webapp

            echo '[PROD] Verifying webapp is running...'
            sleep 5
            if curl -f -s http://localhost:8080/api/health > /dev/null; then
              echo '[PROD] OK: Webapp health check passed'
            else
              echo '[PROD] WARNING: Webapp health check failed - check logs: docker compose logs zana-prod'
            fi

            echo '[PROD] Done.'
          REMOTE_SCRIPT

      - name: Tag production deployment
        if: success()
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" "bash -s -- '$PROJECT_PATH'" <<'REMOTE_SCRIPT'
            set -euo pipefail
            PROJECT_PATH="$1"
            cd "$PROJECT_PATH"
            COMMIT_SHA="$(git rev-parse --short HEAD)"
            TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
            TAG="prod-${TIMESTAMP}-${COMMIT_SHA}"
            git tag -a "$TAG" -m "Production deployment: $(date)" || true
            git push origin "$TAG" || true
            echo "Tagged as: $TAG"
          REMOTE_SCRIPT
