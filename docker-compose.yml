services:
  # =========================
  # PRODUCTION TELEGRAM BOT
  # =========================
  zana-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: zana-ai-bot:prod
    container_name: zana-prod
    depends_on:
      - qdrant
    env_file:
      - /opt/zana-config/.env.prod
    environment:
      - ENVIRONMENT=production
      - LOG_FILE_PATH=/app/logs/zana.log
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-content_chunks_v1}
      - VERTEX_EMBEDDING_MODEL=${VERTEX_EMBEDDING_MODEL:-gemini-embedding-001}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - OBJECT_STORAGE_LOCAL_DIR=/app/USERS_DATA_DIR/_content_assets/pdf
      # DATABASE_URL_PROD should be set in .env.prod
    volumes:
      - /srv/zana-users:/app/USERS_DATA_DIR
      - /srv/zana-logs-prod:/app/logs
    restart: unless-stopped
    networks:
      - web

  # =========================
  # STAGING TELEGRAM BOT
  # =========================
  zana-staging:
    build:
      context: .
      dockerfile: Dockerfile
    image: zana-ai-bot:staging
    container_name: zana-staging
    depends_on:
      - qdrant
    env_file:
      - /opt/zana-config/.env.staging
    environment:
      - ENVIRONMENT=staging
      - LOG_FILE_PATH=/app/logs/zana.log
      - BOT_VERSION=${BOT_VERSION:-}
      - BUILD_DATE=${BUILD_DATE:-}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-content_chunks_v1}
      - VERTEX_EMBEDDING_MODEL=${VERTEX_EMBEDDING_MODEL:-gemini-embedding-001}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - OBJECT_STORAGE_LOCAL_DIR=/app/USERS_DATA_DIR/_content_assets/pdf
      # DATABASE_URL_STAGING should be set in .env.staging
    volumes:
      - /srv/zana-users-staging:/app/USERS_DATA_DIR
      - /srv/zana-logs-staging:/app/logs
    restart: unless-stopped
    networks:
      - web

  # =========================
  # STATS / API SERVICE
  # (adapt this block to match your existing zana-stats config if needed)
  # =========================
  zana-stats:
    build:
      context: .
      dockerfile: stats_service/Dockerfile    # adjust if your stats Dockerfile is elsewhere
    container_name: zana-stats
    env_file:
      - /opt/zana-config/.env.staging                            # or keep your original path
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - web

  # =========================
  # NEW WEBAPP (REAL WEBSITE)
  # =========================
  zana-webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp           # the new minimal webapp Dockerfile
    image: zana-project-webapp
    container_name: zana-webapp
    depends_on:
      - qdrant
    env_file:
      - /opt/zana-config/.env.prod            # Production environment
    environment:
      - CONTENT_LEARNING_PIPELINE_ENABLED=${CONTENT_LEARNING_PIPELINE_ENABLED:-0}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-content_chunks_v1}
      - VERTEX_EMBEDDING_MODEL=${VERTEX_EMBEDDING_MODEL:-gemini-embedding-001}
      - OBJECT_STORAGE_LOCAL_DIR=/app/USERS_DATA_DIR/_content_assets/pdf
      # Telegram login/consent app for the MCP OAuth (Hydra) flow:
      - HYDRA_ADMIN_URL=${HYDRA_ADMIN_URL:-http://hydra:4445}
      - BOT_USERNAME=${BOT_USERNAME:-}
      - MINIAPP_URL=${MINIAPP_URL:-https://xaana.club}
    # IMPORTANT: no host port here – nginx will reach it via Docker network
    expose:
      - "8080"                                # internal FastAPI/uvicorn port
    volumes:
      - /srv/zana-users:/app/USERS_DATA_DIR
    # Production-style: no source bind-mounts.
    # Frontend is built inside Docker (Dockerfile.webapp) and served from /app/webapp_frontend/dist.
    # Database connection via DATABASE_URL_PROD in .env.prod
    working_dir: /app                       # important: match your dev run's -w /app
    #command: ["python", "run_webapp_local.py"]   # ← IMPORTANT
    command: ["uvicorn", "run_webapp_local:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    networks:
      - web

  # =========================
  # MCP SERVER (remote Streamable HTTP) — Phase 1
  # Not started by default. Bring up explicitly with:
  #   docker compose --profile mcp up -d zana-mcp
  # Phase 3 wires nginx (mcp.xaana.club) -> this container with buffering off.
  # =========================
  zana-mcp:
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        BASE_IMAGE: ${MCP_BASE_IMAGE:-zana-ai-bot:staging}
    image: zana-mcp
    container_name: zana-mcp
    env_file:
      - /opt/zana-config/.env.prod            # same DB/config as the app
    environment:
      # OIDC auth via self-hosted Hydra. Setting MCP_OIDC_ISSUER enables auth;
      # leave it empty + set MCP_DEFAULT_USER_ID for a no-auth local smoke test.
      - MCP_OIDC_ISSUER=${HYDRA_PUBLIC_URL:-https://auth.xaana.club}
      - MCP_OIDC_JWKS_URL=${HYDRA_PUBLIC_URL:-https://auth.xaana.club}/.well-known/jwks.json
      - MCP_RESOURCE_URL=${MCP_RESOURCE_URL:-https://mcp.xaana.club}
      - MCP_DEFAULT_USER_ID=${MCP_DEFAULT_USER_ID:-}
      - MINIAPP_URL=${MINIAPP_URL:-https://xaana.club}
    expose:
      - "8090"                                # internal; nginx reaches it via the network
    volumes:
      - /srv/zana-users:/app/USERS_DATA_DIR
    working_dir: /app
    command: ["uvicorn", "run_mcp_local:app", "--host", "0.0.0.0", "--port", "8090"]
    restart: unless-stopped
    networks:
      - web

  # =========================
  # OAUTH (Ory Hydra) — authorization server for the MCP connector. Same "mcp"
  # profile, so `docker compose --profile mcp up -d` brings up the whole stack.
  # Telegram login/consent is served by zana-webapp at /api/oauth/*.
  # nginx fronts hydra:4444 as https://auth.xaana.club. Admin (4445) stays internal.
  # Required secret in .env.prod: HYDRA_SECRETS_SYSTEM (32+ chars).
  # =========================
  hydra-postgres:
    image: postgres:16-alpine
    container_name: zana-hydra-postgres
    profiles: ["mcp"]
    environment:
      - POSTGRES_USER=hydra
      - POSTGRES_PASSWORD=${HYDRA_DB_PASSWORD:-hydra}
      - POSTGRES_DB=hydra
    volumes:
      - /srv/hydra-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - web

  hydra-migrate:
    image: oryd/hydra:v2.2.0
    container_name: zana-hydra-migrate
    profiles: ["mcp"]
    command: migrate sql -e --yes
    environment:
      - DSN=postgres://hydra:${HYDRA_DB_PASSWORD:-hydra}@hydra-postgres:5432/hydra?sslmode=disable
    depends_on:
      hydra-postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - web

  hydra:
    image: oryd/hydra:v2.2.0
    container_name: zana-hydra
    profiles: ["mcp"]
    command: serve all
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    environment:
      - DSN=postgres://hydra:${HYDRA_DB_PASSWORD:-hydra}@hydra-postgres:5432/hydra?sslmode=disable
      - SECRETS_SYSTEM=${HYDRA_SECRETS_SYSTEM}
      - URLS_SELF_ISSUER=${HYDRA_PUBLIC_URL:-https://auth.xaana.club}
      - URLS_SELF_PUBLIC=${HYDRA_PUBLIC_URL:-https://auth.xaana.club}
      - URLS_LOGIN=${MINIAPP_URL:-https://xaana.club}/api/oauth/login
      - URLS_CONSENT=${MINIAPP_URL:-https://xaana.club}/api/oauth/consent
      - URLS_LOGOUT=${MINIAPP_URL:-https://xaana.club}/api/oauth/logout
      # JWT access tokens so the MCP server can verify them via JWKS.
      - STRATEGIES_ACCESS_TOKEN=jwt
      # nginx terminates TLS and proxies http internally; trust the proxy.
      - SERVE_TLS_ALLOW_TERMINATION_FROM=0.0.0.0/0
      - SERVE_COOKIES_SAME_SITE_MODE=Lax
      - LOG_LEVEL=info
    expose:
      - "4444"                                # public OAuth endpoints (nginx -> auth.xaana.club)
      - "4445"                                # admin API (internal only)
    restart: unless-stopped
    networks:
      - web

  # =========================
  # VECTOR SEARCH (Qdrant)
  # =========================
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: zana-qdrant
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - web

  # =========================
  # LANGFUSE — LLM observability + dataset/eval platform
  # Reachable internally as langfuse-web:3000; nginx fronts it as
  # https://langfuse.xaana.club. All env in /opt/zana-config/.env.langfuse
  # (see docs/plan_langfuse_integration.md for required keys).
  #
  # All services are gated behind the "langfuse" profile, so a fresh
  # `docker compose up -d` (or the existing GH Actions deploy that names
  # zana-prod/zana-staging/zana-webapp explicitly) will NOT pull or start
  # them. To bring the stack up:
  #     docker compose --profile langfuse up -d
  # =========================
  langfuse-postgres:
    image: postgres:16-alpine
    container_name: zana-langfuse-postgres
    profiles: ["langfuse"]
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=${LANGFUSE_DB_PASSWORD:-langfuse}
      - POSTGRES_DB=langfuse
    volumes:
      - /srv/langfuse-postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - web

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: zana-langfuse-clickhouse
    profiles: ["langfuse"]
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=${LANGFUSE_CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - /srv/langfuse-clickhouse-data:/var/lib/clickhouse
      - /srv/langfuse-clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    networks:
      - web

  langfuse-redis:
    image: redis:7-alpine
    container_name: zana-langfuse-redis
    profiles: ["langfuse"]
    command:
      - "redis-server"
      - "--requirepass"
      - "${LANGFUSE_REDIS_PASSWORD:-redis}"
    restart: unless-stopped
    networks:
      - web

  langfuse-minio:
    image: minio/minio:RELEASE.2024-08-26T15-33-07Z
    container_name: zana-langfuse-minio
    profiles: ["langfuse"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      - MINIO_ROOT_USER=${LANGFUSE_MINIO_USER:-minio}
      - MINIO_ROOT_PASSWORD=${LANGFUSE_MINIO_PASSWORD:-miniominio}
    volumes:
      - /srv/langfuse-minio:/data
    restart: unless-stopped
    networks:
      - web

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: zana-langfuse-web
    profiles: ["langfuse"]
    depends_on:
      - langfuse-postgres
      - langfuse-clickhouse
      - langfuse-redis
      - langfuse-minio
    env_file:
      - /opt/zana-config/.env.langfuse
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - web

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: zana-langfuse-worker
    profiles: ["langfuse"]
    depends_on:
      - langfuse-postgres
      - langfuse-clickhouse
      - langfuse-redis
      - langfuse-minio
    env_file:
      - /opt/zana-config/.env.langfuse
    restart: unless-stopped
    networks:
      - web

  # =========================
  # NGINX REVERSE PROXY
  # Serves http://xaana.club → zana-webapp:8080
  # =========================
  nginx:
    image: nginx:alpine
    container_name: zana-nginx
    depends_on:
      - zana-webapp
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # later for TLS:
      # - ./letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    networks:
      - web

  # =========================
  # DATABASE MONITORING (PostgreSQL via Supabase Dashboard)
  # PostgreSQL databases are now managed by Supabase and can be accessed via:
  # - Supabase Dashboard (browser-based)
  # - psql command-line tool
  # - Any PostgreSQL client (pgAdmin, DBeaver, etc.)
  # =========================
  # Note: SQLite monitoring service removed - use Supabase dashboard for PostgreSQL monitoring

networks:
  web:
    driver: bridge

volumes:
  qdrant-storage:
