events {}

http {
    # DNS resolver for dynamic upstream resolution
    # Using Docker's internal DNS (127.0.0.11) with short TTL
    # This forces nginx to re-resolve DNS more frequently
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 1) HTTP → HTTPS redirect
    server {
        listen 80;
        server_name xaana.club www.xaana.club;

        return 301 https://$host$request_uri;
    }

    # 2) HTTPS server
    server {
        listen 443 ssl;
        server_name xaana.club www.xaana.club;

        ssl_certificate     /etc/letsencrypt/live/xaana.club/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xaana.club/privkey.pem;

        # basic ssl settings (optional but fine)
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            # Use variable in proxy_pass to force DNS resolution on each request
            # This prevents nginx from caching stale IP addresses
            set $backend "http://zana-webapp:8080";
            proxy_pass $backend;

            # Connection settings
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Standard proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Retry on connection errors (note: with variable proxy_pass,
            # proxy_next_upstream doesn't work, but resolver handles DNS refresh)
        }
    }

    # ===========================================================
    # LANGFUSE BLOCK — disabled until the stack is deployed.
    # Uncomment AFTER:
    #   1. DNS A record for langfuse.xaana.club is created
    #   2. Let's Encrypt cert exists at /etc/letsencrypt/live/langfuse.xaana.club/
    #   3. langfuse-web container is up (`docker compose --profile langfuse up -d`)
    # Then: `sudo docker compose up -d --force-recreate zana-nginx`
    # ===========================================================
    #
    # server {
    #     listen 80;
    #     server_name langfuse.xaana.club;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl;
    #     server_name langfuse.xaana.club;
    #
    #     ssl_certificate     /etc/letsencrypt/live/langfuse.xaana.club/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/langfuse.xaana.club/privkey.pem;
    #
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     client_max_body_size 50m;
    #
    #     # Optional second gate while the project is closed-beta.
    #     # auth_basic           "Langfuse";
    #     # auth_basic_user_file /etc/nginx/.htpasswd-langfuse;
    #
    #     location / {
    #         set $lf_backend "http://langfuse-web:3000";
    #         proxy_pass $lf_backend;
    #
    #         proxy_http_version 1.1;
    #         proxy_set_header Connection "";
    #
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #
    #         proxy_connect_timeout 10s;
    #         proxy_send_timeout    300s;
    #         proxy_read_timeout    300s;
    #     }
    # }

    # ===========================================================
    # MCP + HYDRA BLOCK — disabled until the stack is deployed.
    # Uncomment AFTER:
    #   1. DNS A records for auth.xaana.club AND mcp.xaana.club exist
    #   2. Certs issued:
    #        sudo certbot certonly --webroot -w /var/www/certbot \
    #          -d auth.xaana.club -d mcp.xaana.club
    #   3. Stack is up: `docker compose --profile mcp up -d`
    # Then: `sudo docker compose up -d --force-recreate zana-nginx`
    # ===========================================================
    #
    # --- Hydra (OAuth authorization server) ---
    server {
        listen 80;
        server_name auth.xaana.club;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name auth.xaana.club;

        ssl_certificate     /etc/letsencrypt/live/auth.xaana.club/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.xaana.club/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Hydra 2.2 lacks RFC 8414 and dynamic registration endpoints. The
        # webapp supplies a narrow compatibility facade backed by Hydra admin.
        # Use a variable + the http-level resolver so zana-webapp is re-resolved
        # per request: every `master` push rebuilds zana-webapp with a new IP,
        # and a literal proxy_pass caches the old IP -> 502 (connection refused).
        location = /.well-known/oauth-authorization-server {
            set $webapp "zana-webapp:8080";
            proxy_pass http://$webapp/api/oauth/metadata;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /oauth2/register {
            set $webapp "zana-webapp:8080";
            proxy_pass http://$webapp/api/oauth/register;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            set $hydra_backend "http://hydra:4444";   # public port only; NOT 4445 (admin)
            proxy_pass $hydra_backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }

    # --- MCP server (Streamable HTTP — buffering OFF for SSE) ---
    server {
        listen 80;
        server_name mcp.xaana.club;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name mcp.xaana.club;

        ssl_certificate     /etc/letsencrypt/live/auth.xaana.club/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.xaana.club/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            set $mcp_backend "http://zana-mcp:8090";
            proxy_pass $mcp_backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Streamable HTTP / SSE: stream chunks immediately, hold long connections.
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 10s;
            proxy_send_timeout    3600s;
            proxy_read_timeout    3600s;
        }
    }
}
