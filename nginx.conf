events {}

http {
    # DNS resolver for dynamic upstream resolution
    # Using Docker's internal DNS (127.0.0.11) with short TTL
    # This forces nginx to re-resolve DNS more frequently
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 1) HTTP → HTTPS redirect
    server {
        listen 80;
        server_name xaana.club www.xaana.club;

        return 301 https://$host$request_uri;
    }

    # 2) HTTPS server
    server {
        listen 443 ssl;
        server_name xaana.club www.xaana.club;

        ssl_certificate     /etc/letsencrypt/live/xaana.club/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xaana.club/privkey.pem;

        # basic ssl settings (optional but fine)
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            # Use variable in proxy_pass to force DNS resolution on each request
            # This prevents nginx from caching stale IP addresses
            set $backend "http://zana-webapp:8080";
            proxy_pass $backend;

            # Connection settings
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Standard proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Retry on connection errors (note: with variable proxy_pass,
            # proxy_next_upstream doesn't work, but resolver handles DNS refresh)
        }
    }

    # 3) HTTP → HTTPS redirect for langfuse subdomain
    server {
        listen 80;
        server_name langfuse.xaana.club;
        return 301 https://$host$request_uri;
    }

    # 4) HTTPS — langfuse.xaana.club → langfuse-web:3000
    # Auth is enforced by Langfuse itself (NEXTAUTH session); the
    # `auth_basic` line below is an *optional* second gate while the project
    # is closed-beta. Remove the two lines once Langfuse SSO is configured.
    server {
        listen 443 ssl;
        server_name langfuse.xaana.club;

        ssl_certificate     /etc/letsencrypt/live/langfuse.xaana.club/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/langfuse.xaana.club/privkey.pem;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Langfuse uploads can include large prompts/dataset items.
        client_max_body_size 50m;

        # Optional admin gate (managed via /etc/nginx/.htpasswd-langfuse on the host).
        # Comment out if unwanted.
        # auth_basic           "Langfuse";
        # auth_basic_user_file /etc/nginx/.htpasswd-langfuse;

        location / {
            set $lf_backend "http://langfuse-web:3000";
            proxy_pass $lf_backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Langfuse worker can take a while during exports / large traces.
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }
    }
}
