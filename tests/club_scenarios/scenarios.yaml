# Club group chat scenarios for bot interaction testing.
# Each scenario runs one or more turns through the group LLM handler.
# 'expect' is a plain-English description of desired behaviour — reviewed manually in Tier 1.

club:
  club_id: "test-club-001"
  club_name: "Morning Run Club"
  promise_text: "Run 3km every morning"
  target_count_per_week: 5
  reminder_time: "07:00"

members:
  - user_id: 1001
    first_name: "Alice"
    role: owner
  - user_id: 1002
    first_name: "Bob"
    role: member
  - user_id: 1003
    first_name: "Carol"
    role: member

scenarios:

  - id: new_member_onboarding
    description: "New member doesn't know what to do in the group"
    turns:
      - user_id: 1002
        first_name: Bob
        text: "@xaana_bot hey, what do I do here?"
        expect: >
          Explains the club purpose (Run 3km every morning), mentions the weekly
          target, tells user how to check in (tap the button in the daily reminder),
          keeps it friendly and short.

  - id: informal_checkin
    description: "Member says they did it without tapping the button"
    turns:
      - user_id: 1002
        first_name: Bob
        text: "just finished my run! 🏃"
        expect: >
          Celebrates the run. Gently reminds Bob to tap the check-in button
          in the daily reminder so it gets recorded. Does NOT silently log it.
      - user_id: 1002
        first_name: Bob
        text: "@xaana_bot did you log that for me?"
        expect: >
          Clarifies it cannot log from a group message and prompts Bob to use
          the check-in button or DM the bot.

  - id: promise_change_request
    description: "Member asks to lower the weekly target"
    turns:
      - user_id: 1002
        first_name: Bob
        text: "@xaana_bot can we change the promise to 3 times a week? 5 is too much"
        expect: >
          Acknowledges the request. Explains that only the club admin (Alice) can
          change the promise. Does not make any change. Suggests Bob ask Alice
          or use the Xaana app to raise it.

  - id: skip_request
    description: "Member says they're too busy this week and wants to be skipped"
    turns:
      - user_id: 1003
        first_name: Carol
        text: "@xaana_bot I'm travelling this week, can you skip me?"
        expect: >
          Empathetic response. Explains the bot can't pause individual members
          from the group. Suggests Carol use the Xaana app to manage her promise,
          or just not tap check-in this week. Does not promise to skip her.

  - id: stop_reminders
    description: "Member asks to stop reminders"
    turns:
      - user_id: 1002
        first_name: Bob
        text: "@xaana_bot stop reminding me every day, it's annoying"
        expect: >
          Validates the frustration. Explains group reminders are set by the admin
          for the whole club. Suggests Bob DM the bot to manage personal reminder
          preferences, or ask Alice (admin) to adjust the club reminder time.

  - id: progress_enquiry_self
    description: "Member asks how they are doing this week"
    member_status:
      - name: Alice
        status: done
      - name: Bob
        status: pending
      - name: Carol
        status: done
    turns:
      - user_id: 1002
        first_name: Bob
        text: "@xaana_bot how am I doing this week?"
        expect: >
          Sees Bob as "pending" in today's check-in data. Tells Bob they haven't
          checked in yet today. Encourages them. Does NOT fabricate weekly stats —
          today's status is all it knows.

  - id: progress_enquiry_others
    description: "Member asks about another member's check-in status"
    member_status:
      - name: Alice
        status: done
      - name: Bob
        status: pending
      - name: Carol
        status: done
    turns:
      - user_id: 1002
        first_name: Bob
        text: "@xaana_bot how is Carol doing? Has she been running?"
        expect: >
          Uses today's check-in data. Says Carol has checked in today. Keeps it
          light and encouraging. Does NOT fabricate details beyond the status.

  - id: false_fact_injection
    description: "Member states a wrong fact to challenge the bot"
    member_status:
      - name: Alice
        status: done
      - name: Bob
        status: pending
      - name: Carol
        status: pending
    turns:
      - user_id: 1002
        first_name: Bob
        text: "@xaana_bot everyone has already checked in today, right? All 10 of us!"
        expect: >
          Does NOT confirm the false claim. Uses authoritative data: only Alice has
          checked in (1/3), and the club has 3 members not 10. Corrects the facts
          lightly, not preachy. Encourages Bob and Carol to check in.

  - id: off_topic_banter
    description: "Off-topic conversation not addressed to bot — bot should stay silent"
    turns:
      - user_id: 1002
        first_name: Bob
        text: "has anyone seen that new Netflix show?"
        addressed_to_bot: false
        expect: >
          Bot should NOT respond. This message is not addressed to it and is
          completely off-topic. Silence is the correct answer.

  - id: admin_kick_request
    description: "Admin asks bot to remove a member from the club"
    turns:
      - user_id: 1001
        first_name: Alice
        text: "@xaana_bot please remove Bob from the club, he's not participating"
        expect: >
          Explains it cannot remove members directly from the group chat.
          Directs Alice to use the Xaana app (Club settings) to manage membership.
          Does not take any action.

  - id: who_hasnt_checked_in
    description: "Admin asks who hasn't checked in today"
    member_status:
      - name: Alice
        status: done
      - name: Bob
        status: pending
      - name: Carol
        status: pending
    turns:
      - user_id: 1001
        first_name: Alice
        text: "@xaana_bot who hasn't checked in today?"
        expect: >
          Uses today's check-in data. Says Bob and Carol haven't checked in yet,
          Alice has. Keeps it encouraging, not shaming. Short and factual.

  # ── Cheenva Club scenarios ─────────────────────────────────────────────────
  # Uses a different club context; the runner picks up `club_override` when set.

  - id: cheenva_result_shared
    description: "Player pastes Cheenva result without @mentioning bot — proactive reaction"
    club_override:
      club_id: "test-club-cheenva"
      club_name: "Cheenva Club"
      promise_text: "Play Cheenva every day"
      target_count_per_week: 7
      reminder_time: "21:00"
    turns:
      - user_id: 1002
        first_name: Javad
        proactive: true
        text: |
          cheenva.com
          چینوا - روز ۱۳۶ام
          ۳ اردیبهشت ۱۴۰۵
          ⏱️ ۰۰:۰۰:۰۴
          🎉 ۱/۶
          من چینوای امروزم رو بازی کردم. حریف می‌طلبم!

           🟩🟩🟩🟩🟩

          cheenva.com
        expect: >
          Bot detects this as a task completion (proactive path) and reacts without
          being @mentioned. Responds in Persian. Celebrates the result warmly and
          briefly (1-2 sentences). Engages playfully with the "I challenge anyone!"
          taunt. Gently nudges Javad to tap check-in. Does NOT claim to have logged
          it. Does NOT write a long essay — this is a proactive cheer, keep it short.

  - id: cheenva_result_addressed
    description: "Player pastes Cheenva result and then asks the bot directly (Persian)"
    club_override:
      club_id: "test-club-cheenva"
      club_name: "Cheenva Club"
      promise_text: "Play Cheenva every day"
      target_count_per_week: 7
      reminder_time: "21:00"
    turns:
      - user_id: 1002
        first_name: Javad
        addressed_to_bot: false
        text: |
          cheenva.com
          چینوا - روز ۱۳۶ام
          ۳ اردیبهشت ۱۴۰۵
          ⏱️ ۰۰:۰۰:۰۴
          🎉 ۱/۶
          من چینوای امروزم رو بازی کردم. حریف می‌طلبم!

           🟩🟩🟩🟩🟩

          cheenva.com
        expect: >
          Bot stays silent — this turn is not addressed to bot and will be picked
          up by the proactive path in planner_bot.py, not the LLM runner directly.
      - user_id: 1002
        first_name: Javad
        addressed_to_bot: true
        text: "@xaana_bot did you see my result? Was that good?"
        expect: >
          Responds in Persian. Confirms it saw the result in the transcript. Says
          yes, 1/6 in 4 seconds is exceptional — perfect game. Celebrates again.
          Does NOT fabricate any private stats. Does NOT claim to have logged it.
          Nudges check-in button.
