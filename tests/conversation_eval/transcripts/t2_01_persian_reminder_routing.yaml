# -*- coding: utf-8 -*-
# Regression: Persian reminder was mis-routed to `engagement` instead of `operator`.
# The router (llama-3.3-70b) should recognise the transactional intent even in Persian.
name: t2_01_persian_reminder_routing
description: Persian reminder phrase must route to operator and call create_reminder
tier: 2
turns:
  - user: "یادم باش امشب به کامران یک ایمیل بفرستم"
    expect_route: operator
    expect_tools:
      - create_reminder
    expect_no_tools:
      - add_promise
rubric:
  intent: true
  correctness: true
