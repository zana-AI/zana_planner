<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Xaana — Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-sans); }
  .card { padding: 20px 22px; display: grid; gap: 12px; }
  .stack { position: relative; height: 240px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .layer { position: absolute; left: 0; right: 0; padding: 10px 14px; font-size: 12px; color: var(--fg-muted); font-family: var(--font-mono); }
  .l-bg       { top:0;   height: 80px; background: #0B0F1A; }
  .l-elevated { top: 60px; left: 16px; right: 16px; height: 80px; background: #10162A; border: 1px solid var(--border); border-radius: 12px; }
  .l-surface  { top: 110px; left: 36px; right: 36px; height: 80px; background: #141C34; border: 1px solid var(--border); border-radius: 12px; }
  .l-hover    { top: 158px; left: 56px; right: 56px; height: 64px; background: #1B2542; border: 1px solid var(--border-strong); border-radius: 10px; }
  .tag { font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="l-bg layer">--bg · #0B0F1A</div>
    <div class="l-elevated layer">--bg-elevated · #10162A</div>
    <div class="l-surface layer">--surface · #141C34</div>
    <div class="l-hover layer">--surface-hover · #1B2542</div>
  </div>
</div>
</body></html>
