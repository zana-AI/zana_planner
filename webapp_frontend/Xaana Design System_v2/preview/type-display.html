<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Xaana — Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font-sans); }
  .card { padding: 22px 24px; display: grid; gap: 14px; }
  .row { display: grid; grid-template-columns: 80px 1fr; gap: 16px; align-items: baseline; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="meta">44 · 800</div><div class="ds-h1">Track your week</div></div>
  <div class="row"><div class="meta">32 · 700</div><div class="ds-h2">Track your week</div></div>
  <div class="row"><div class="meta">24 · 700</div><div class="ds-h3">Track your week</div></div>
  <div class="row"><div class="meta">20 · 700</div><div class="ds-h4">Track your week</div></div>
  <div class="row"><div class="meta">17 · 600</div><div class="ds-h5">Track your week</div></div>
</div>
</body></html>
